# CI/CD for parking-experience-api - Build and Deploy to CloudHub 2.0
# Triggers: push to main/develop, manual workflow_dispatch
# Prerequisites: ANYPOINT_USERNAME, ANYPOINT_PASSWORD in repo Secrets

name: Build and Deploy to CloudHub 2.0

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Configure Maven settings for Exchange
        uses: whelk-io/maven-settings-xml-action@v20
        with:
          repositories: |
            [
              {"id": "maven-central", "name": "Maven Central", "url": "https://repo1.maven.org/maven2/", "releases": {"enabled": true}, "snapshots": {"enabled": true}},
              {"id": "mulesoft-releases", "name": "MuleSoft Releases", "url": "https://repository.mulesoft.org/releases/", "releases": {"enabled": true}, "snapshots": {"enabled": true}},
              {"id": "mulesoft-public", "name": "MuleSoft Public", "url": "https://repository.mulesoft.org/nexus/content/repositories/public", "releases": {"enabled": true}, "snapshots": {"enabled": false}},
              {"id": "anypoint-exchange-v3", "name": "Anypoint Exchange V3", "url": "https://maven.anypoint.mulesoft.com/api/v3/maven", "releases": {"enabled": true}, "snapshots": {"enabled": true}},
              {"id": "anypoint-exchange-org", "name": "Anypoint Exchange Organization", "url": "https://maven.anypoint.mulesoft.com/api/v3/organizations/cabb7133-46c6-49fb-867e-ee1dd40d3c21/maven", "releases": {"enabled": true}, "snapshots": {"enabled": true}}
            ]
          plugin_repositories: |
            [{"id": "mulesoft-releases", "url": "https://repository.mulesoft.org/releases/"}, {"id": "mule-public", "url": "https://repository.mulesoft.org/nexus/content/repositories/public"}]
          servers: |
            [
              {"id": "anypoint-exchange-server", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"},
              {"id": "anypoint-exchange-v3", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"},
              {"id": "anypoint-exchange-org", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"}
            ]

      - name: Compile and Run MUnit Tests
        run: mvn -B clean package

      # ARCHITECTURE OPTIMIZATION: Save the compiled .jar so the next job doesn't rebuild it
      - name: Upload Compiled Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mule-application-jar
          path: target/*.jar
          retention-days: 1

  deploy:
    name: Publish and Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
        
      # ENVIRONMENT FIX: Forces Maven 3.8.8 to prevent the Aether API crash with older Mule plugins
      - name: Set up Maven 3.8.8
        uses: stcarolas/setup-maven@v4
        with:
          maven-version: "3.8.8"

      - name: Configure Maven settings for Exchange
        uses: whelk-io/maven-settings-xml-action@v20
        with:
          repositories: |
            [
              {"id": "maven-central", "name": "Maven Central", "url": "https://repo1.maven.org/maven2/", "releases": {"enabled": true}, "snapshots": {"enabled": true}},
              {"id": "mulesoft-releases", "name": "MuleSoft Releases", "url": "https://repository.mulesoft.org/releases/", "releases": {"enabled": true}, "snapshots": {"enabled": true}},
              {"id": "mulesoft-public", "name": "MuleSoft Public", "url": "https://repository.mulesoft.org/nexus/content/repositories/public", "releases": {"enabled": true}, "snapshots": {"enabled": false}},
              {"id": "anypoint-exchange-v3", "name": "Anypoint Exchange V3", "url": "https://maven.anypoint.mulesoft.com/api/v3/maven", "releases": {"enabled": true}, "snapshots": {"enabled": true}},
              {"id": "anypoint-exchange-org", "name": "Anypoint Exchange Organization", "url": "https://maven.anypoint.mulesoft.com/api/v3/organizations/cabb7133-46c6-49fb-867e-ee1dd40d3c21/maven", "releases": {"enabled": true}, "snapshots": {"enabled": true}}
            ]
          plugin_repositories: |
            [{"id": "mulesoft-releases", "url": "https://repository.mulesoft.org/releases/"}, {"id": "mule-public", "url": "https://repository.mulesoft.org/nexus/content/repositories/public"}]
          servers: |
            [
              {"id": "anypoint-exchange-server", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"},
              {"id": "anypoint-exchange-v3", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"},
              {"id": "anypoint-exchange-org", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"}
            ]

      # ARCHITECTURE OPTIMIZATION: Retrieve the compiled .jar from the previous job
      - name: Download Compiled Artifact
        uses: actions/download-artifact@v4
        with:
          name: mule-application-jar
          path: target/

      # DEPLOYMENT: The -DskipTests flag is crucial here. Since the 'build' job already tested the code,
      # this prevents Maven from spinning up the MUnit container a second time during the deploy lifecycle.
      - name: Publish to Exchange and Deploy to CloudHub 2.0
        run: mvn -B deploy -DmuleDeploy -DskipTests