name: Build and Deploy to CloudHub 2.0

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Configure Maven settings for Exchange
        uses: whelk-io/maven-settings-xml-action@v20
        with:
          repositories: |
            [
              {"id": "mulesoft-releases", "name": "MuleSoft Releases", "url": "https://repository.mulesoft.org/releases/", "releases": {"enabled": true}, "snapshots": {"enabled": true}},
              {"id": "mulesoft-public", "name": "MuleSoft Public", "url": "https://repository.mulesoft.org/nexus/content/repositories/public", "releases": {"enabled": true}, "snapshots": {"enabled": false}},
              {"id": "anypoint-exchange-v3", "name": "Anypoint Exchange V3", "url": "https://maven.anypoint.mulesoft.com/api/v3/maven", "releases": {"enabled": true}, "snapshots": {"enabled": true}}
            ]
          plugin_repositories: |
            [
              {"id": "mulesoft-releases", "url": "https://repository.mulesoft.org/releases/"},
              {"id": "mulesoft-public", "url": "https://repository.mulesoft.org/nexus/content/repositories/public"}
            ]
          servers: |
            [
              {"id": "anypoint-exchange-org", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"},
              {"id": "anypoint-exchange-v3", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"}
            ]

      # CRITICAL FIX: The -U flag forces Maven to ignore the broken cache
      - name: Compile and Run MUnit Tests
        run: mvn -B clean package -U

      - name: Upload Compiled Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mule-application-jar
          path: target/*.jar
          retention-days: 1

  deploy:
    name: Publish and Deploy
    needs: build
    runs-on: ubuntu-latest
    
    env:
      ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
      ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
        
      - name: Set up Maven 3.8.8
        uses: stcarolas/setup-maven@v4
        with:
          maven-version: "3.8.8"

      - name: Configure Maven settings for Exchange
        uses: whelk-io/maven-settings-xml-action@v20
        with:
          repositories: |
            [
              {"id": "mulesoft-releases", "name": "MuleSoft Releases", "url": "https://repository.mulesoft.org/releases/", "releases": {"enabled": true}, "snapshots": {"enabled": true}},
              {"id": "mulesoft-public", "name": "MuleSoft Public", "url": "https://repository.mulesoft.org/nexus/content/repositories/public", "releases": {"enabled": true}, "snapshots": {"enabled": false}},
              {"id": "anypoint-exchange-v3", "name": "Anypoint Exchange V3", "url": "https://maven.anypoint.mulesoft.com/api/v3/maven", "releases": {"enabled": true}, "snapshots": {"enabled": true}}
            ]
          plugin_repositories: |
            [
              {"id": "mulesoft-releases", "url": "https://repository.mulesoft.org/releases/"},
              {"id": "mulesoft-public", "url": "https://repository.mulesoft.org/nexus/content/repositories/public"}
            ]
          servers: |
            [
              {"id": "anypoint-exchange-org", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"},
              {"id": "anypoint-exchange-v3", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}"}
            ]

      - name: Download Compiled Artifact
        uses: actions/download-artifact@v4
        with:
          name: mule-application-jar
          path: target/

       - name: Publish Artifact to Anypoint Exchange
        run: mvn -B deploy -DskipTests -s ~/.m2/settings.xml -U

      #  - Tell CloudHub 2.0 to fetch the asset from Exchange and spin up the replica
      - name: Deploy to CloudHub 2.0 Infrastructure
        run: mvn -B mule:deploy -DmuleDeploy -DskipTests -s ~/.m2/settings.xml -Dmule.env=dev -Dmule.vault.key="${{ secrets.MULE_VAULT_KEY }}"